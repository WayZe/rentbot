version: "3.9"

services:
  db:
    image: postgres:15
    container_name: rentbot_db
    restart: always
    environment:
      POSTGRES_DB: rentbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: rentbot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example

volumes:
  pgdata:
